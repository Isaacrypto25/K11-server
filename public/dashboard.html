<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#05060c">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.googleapis.com https://fonts.gstatic.com;">
    <title>K11 OMNI ELITE v8 - Dashboard Profissional</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <!-- K11 v8: Three.js + Engine -->
    <script>
    (function(){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        s.onload=function(){
            var c=document.getElementById('k11-threejs-canvas');
            if(c && window.THREE && window.K11ThreeBG) {
                K11ThreeBG.init(c);
            }
        };
        s.onerror=function(){
            console.warn('âš ï¸  Three.js background failed to load. Continuing without 3D effects.');
        };
        document.head.appendChild(s);
    })();
    </script>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="k11-sidebar-v9.css">
    <link rel="stylesheet" href="k11-orcamento-ia.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        /* AREA DO GESTOR */
        .gestor-only { display: none; }
        body.role-gestor .gestor-only,
        body.role-super .gestor-only { display: initial; }
        body.role-gestor .gestor-only.flex { display: flex; }
        body.role-gestor .gestor-only.grid { display: grid; }

        /* AREA DO COLABORADOR */
        .colaborador-only { display: none; }
        body.role-colaborador .colaborador-only,
        body.role-gestor .colaborador-only,
        body.role-super .colaborador-only { display: initial; }

        /* AREA DO CLIENTE */
        .cliente-only { display: none; }
        body.role-cliente .cliente-only { display: initial; }

        /* Ocultar area de gestor para clientes */
        body.role-cliente .no-cliente { display: none !important; }
        body.role-cliente .nav-btn[data-view="operacional"],
        body.role-cliente .nav-btn[data-view="estoque"],
        body.role-cliente .nav-btn[data-view="rastreio"],
        body.role-cliente .nav-btn[data-view="recebimento"],
        body.role-cliente #k11-voice-btn,
        body.role-cliente .nav-btn[data-view="projetor"] { display: none; }
        body.role-cliente .nav-btn[data-view="obraHome"] { display: flex; }
        /* Botoes exclusivos do cliente */
        .nav-btn[data-view="clienteCatalogo"],
        .nav-btn[data-view="clienteCarrinho"],
        .nav-btn[data-view="clientePedidos"],
        .nav-btn[data-view="clienteOrcamento"],
        .nav-btn[data-view="clienteFinanceiro"] { display: none; }
        body.role-cliente .nav-btn[data-view="clienteCatalogo"],
        body.role-cliente .nav-btn[data-view="clienteCarrinho"],
        body.role-cliente .nav-btn[data-view="clientePedidos"],
        body.role-cliente .nav-btn[data-view="clienteOrcamento"],
        body.role-cliente .nav-btn[data-view="clienteFinanceiro"] { display: flex; }
        /* Badge do carrinho */
        .cart-nav-badge { position:absolute;top:2px;right:2px;background:#F4530C;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center;display:none }
        body.role-cliente .cart-nav-badge { display:block }

        /* PORTAL DO CLIENTE */
        .cliente-portal-header {
            background: linear-gradient(135deg, rgba(16,185,129,.1), transparent);
            border-bottom: 1px solid rgba(16,185,129,.2);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .cliente-portal-header .logo {
            font-size: 24px;
            font-weight: bold;
            color: #10B981;
        }
        .cliente-portal-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #E0E0E0;
        }
        .cliente-portal-header .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #10B981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #05060c;
        }
        .cliente-portal-header .user-info span {
            font-size: 16px;
        }

        /* Dashboard de Obra */
        .obra-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .obra-card {
            background-color: #1A1D24;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease-in-out;
            cursor: pointer;
            border: 1px solid #2A2D35;
        }
        .obra-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        .obra-card h3 {
            color: #10B981;
            font-size: 20px;
            margin-bottom: 10px;
        }
        .obra-card p {
            color: #B0B0B0;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .obra-card .status {
            display: inline-block;
            background-color: rgba(16,185,129,.2);
            color: #10B981;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
        }
        .obra-card .progress-bar-container {
            background-color: #333;
            border-radius: 5px;
            height: 8px;
            margin-top: 10px;
            overflow: hidden;
        }
        .obra-card .progress-bar {
            height: 100%;
            background-color: #10B981;
            border-radius: 5px;
            width: var(--progress-width, 0%);
            transition: width 0.5s ease-in-out;
        }
        .obra-card .meta-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 10px;
        }

        /* Estilos para o Modal de Detalhes da Obra */
        .obra-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease-out;
        }
        .obra-modal-content {
            background-color: #0d0f18;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            position: relative;
            animation: slideIn 0.3s ease-out;
            color: #E0E0E0;
            border: 1px solid #10B981;
        }
        .obra-modal-content h2 {
            color: #10B981;
            margin-bottom: 20px;
            font-size: 28px;
            border-bottom: 1px solid rgba(16,185,129,.3);
            padding-bottom: 10px;
        }
        .obra-modal-content p {
            margin-bottom: 10px;
            line-height: 1.8;
            font-size: 15px;
        }
        .obra-modal-content .status-badge {
            background-color: rgba(16,185,129,.2);
            color: #10B981;
            padding: 7px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 15px;
            display: inline-block;
        }
        .obra-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #aaa;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s;
        }
        .obra-modal-close:hover,
        .obra-modal-close:focus {
            color: #fff;
            text-decoration: none;
        }
        .obra-modal-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px dashed rgba(16,185,129,.1);
        }
        .obra-modal-info-grid strong {
            color: #10B981;
            margin-right: 5px;
        }
        .obra-modal-progress-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px dashed rgba(16,185,129,.1);
        }
        .obra-modal-progress-section h3 {
            color: #10B981;
            margin-bottom: 10px;
            font-size: 20px;
        }
        .obra-modal-actions {
            margin-top: 30px;
            text-align: right;
            border-top: 1px solid rgba(16,185,129,.3);
            padding-top: 20px;
        }
        .obra-modal-actions button {
            background-color: #10B981;
            color: #0d0f18;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.2s;
        }
        .obra-modal-actions button:hover {
            background-color: #0e9f6e;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

    </style>
</head>

    <!-- NOTIFICAÇÕES TOAST -->

    <!-- MODAL GLOBAL -->

        <div class="k11-modal-content">
            <span class="k11-modal-close">&times;</span>
            <h2 id="k11-modal-title"></h2>
            <div id="k11-modal-body"></div>
            <div id="k11-modal-footer"></div>
        </div>
    </div>

    <!-- MODAL DE DETALHES DA OBRA (CLIENTE) -->
    <div id="obraDetailModal" class="obra-modal">
        <div class="obra-modal-content">
            <span class="obra-modal-close">&times;</span>
            <h2 id="obraModalTitle"></h2>
            <div class="obra-modal-info-grid">
                <div><strong>Cliente:</strong> <span id="obraModalClient"></span></div>
                <div><strong>Localização:</strong> <span id="obraModalLocation"></span></div>
                <div><strong>Data Início:</strong> <span id="obraModalStartDate"></span></div>
                <div><strong>Prazo:</strong> <span id="obraModalDeadline"></span></div>
            </div>
            <p><strong>Descrição:</strong> <span id="obraModalDescription"></span></p>
            <div class="obra-modal-progress-section">
                <h3>Progresso da Obra</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="obraModalProgressBar"></div>
                </div>
                <p>Status Atual: <span id="obraModalStatus" class="status-badge"></span></p>
            </div>
            <div class="obra-modal-actions">
                <button id="obraModalViewDetails">Ver Detalhes Completos</button>
            </div>
