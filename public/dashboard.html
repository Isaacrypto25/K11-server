<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#05060c">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://cdnjs.cloudflare.com https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.googleapis.com https://fonts.gstatic.com;">
    <title>K11 OMNI ELITE v8 - Dashboard Profissional</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <!-- K11 v8: Three.js + Engine -->
    <script>
    (function(){
        var s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        s.onload=function(){
            var c=document.getElementById('k11-threejs-canvas');
            if(c && window.THREE && window.K11ThreeBG) {
                K11ThreeBG.init(c);
            }
        };
        s.onerror=function(){
            console.warn('⚠️ Three.js background failed to load. Continuing without 3D effects.');
        };
        document.head.appendChild(s);
    })();
    </script>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="k11-sidebar-v9.css">
    <link rel="stylesheet" href="k11-orcamento-ia.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <style>
        /* AREA DO GESTOR */
        .gestor-only { display: none; }
        body.role-gestor .gestor-only,
        body.role-super .gestor-only { display: initial; }
        body.role-gestor .gestor-only.flex { display: flex; }
        body.role-gestor .gestor-only.grid { display: grid; }

        /* AREA DO COLABORADOR */
        .colaborador-only { display: none; }
        body.role-colaborador .colaborador-only,
        body.role-gestor .colaborador-only,
        body.role-super .colaborador-only { display: initial; }

        /* AREA DO CLIENTE */
        .cliente-only { display: none; }
        body.role-cliente .cliente-only { display: initial; }

        /* Ocultar area de gestor para clientes */
        body.role-cliente .no-cliente { display: none !important; }
        body.role-cliente .nav-btn[data-view="operacional"],
        body.role-cliente .nav-btn[data-view="estoque"],
        body.role-cliente .nav-btn[data-view="rastreio"],
        body.role-cliente .nav-btn[data-view="recebimento"],
        body.role-cliente #k11-voice-btn,
        body.role-cliente .nav-btn[data-view="projetor"] { display: none; }
        body.role-cliente .nav-btn[data-view="obraHome"] { display: flex; }
        /* Botoes exclusivos do cliente */
        .nav-btn[data-view="clienteCatalogo"],
        .nav-btn[data-view="clienteCarrinho"],
        .nav-btn[data-view="clientePedidos"],
        .nav-btn[data-view="clienteOrcamento"],
        .nav-btn[data-view="clienteFinanceiro"] { display: none; }
        body.role-cliente .nav-btn[data-view="clienteCatalogo"],
        body.role-cliente .nav-btn[data-view="clienteCarrinho"],
        body.role-cliente .nav-btn[data-view="clientePedidos"],
        body.role-cliente .nav-btn[data-view="clienteOrcamento"],
        body.role-cliente .nav-btn[data-view="clienteFinanceiro"] { display: flex; }
        /* Badge do carrinho */
        .cart-nav-badge { position:absolute;top:2px;right:2px;background:#F4530C;color:#fff;font-size:9px;font-weight:800;padding:1px 5px;border-radius:20px;min-width:16px;text-align:center;display:none }
        body.role-cliente .cart-nav-badge { display:block }

        /* PORTAL DO CLIENTE */
        .cliente-portal-header {
            background: linear-gradient(135deg, rgba(16,185,129,.1), transparent);
            border: 1px solid rgba(16,185,129,.25);
            border-radius: var(--radius-xl);
            padding: 20px;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        /* Loading skeleton para sidebar */
        .sidebar-nav::before {
            content: '';
            display: block;
            height: 20px;
            background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            margin: 8px 0;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <!-- Three.js canvas para background -->
    <canvas id="k11-threejs-canvas" aria-hidden="true" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.18"></canvas>

    <!-- Sidebar -->
    <nav id="k11-sidebar" class="sidebar">
        <div class="sidebar-header">
            <img src="icons/icon-192.png" alt="K11 Logo" class="sidebar-logo">
            <span class="sidebar-title">K11 OMNI</span>
        </div>
        <div class="sidebar-nav" id="k11-nav" role="navigation" aria-label="Menu principal">
            <!-- Conteúdo injetado por JavaScript após autenticação -->
        </div>
    </nav>

    <!-- Main content -->
    <main id="k11-main" class="main-content">
        <div id="k11-view-container"></div>
    </main>

    <!-- Scripts carregados com defer para não bloquear renderização -->

</body>
</html>
