<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="theme-color" content="#05060c">
    <title>K11 OMNI ELITE — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css?v=2">
    <link rel="stylesheet" href="k11-skill-styles.css?v=2">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="k11-root">
        <div id="k11-splash" style="position:fixed;inset:0;background:#05060c;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;gap:16px;">
            <div style="font-size:28px;font-weight:900;color:#FF8C00;letter-spacing:2px;">K11</div>
            <div style="font-size:12px;color:#5A6480;letter-spacing:4px;text-transform:uppercase;">OMNI ELITE</div>
            <div style="width:48px;height:2px;background:#1A1D2E;border-radius:2px;overflow:hidden;margin-top:8px;">
                <div id="splash-bar" style="height:100%;background:#FF8C00;width:0%;transition:width 2s ease;border-radius:2px;"></div>
            </div>
        </div>
    </div>
    <div id="k11-modal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.75);backdrop-filter:blur(4px)"></div>
    <div id="k11-toast" style="position:fixed;bottom:24px;right:24px;z-index:99998;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

    <!-- ══ CAMADA 1: Base ══════════════════════════ -->
    <script src="k11-config.js?v=4"></script>
    <script src="k11-utils.js?v=4"></script>
    <!-- ══ CAMADA 2: Sistemas de negócio ═══════════ -->
    <script src="k11-skill-system.js?v=4"></script>
    <script src="k11-mission-engine.js?v=4"></script>
    <!-- ══ CAMADA 3: Processamento e UI ════════════ -->
    <script src="k11-processors.js?v=4"></script>
    <script src="k11-ui.js?v=4"></script>
    <script src="k11-views.js?v=4"></script>
    <script src="k11-brain-auxiliar.js?v=4"></script>
    <!-- ══ CAMADA 4: Dados e ações ══════════════════ -->
    <script src="k11-data-inject.js?v=4"></script>
    <script src="k11-actions-.js?v=4"></script>
    <script src="k11-actions-extras-v5.js?v=4"></script>
    <!-- ══ CAMADA 5: Componentes UI ═════════════════ -->
    <script src="k11-menu-expandable.js?v=4"></script>
    <script src="k11-modal-regional.js?v=4"></script>
    <script src="k11-onboarding-modal.js?v=4"></script>
    <script src="k11-user-profile.js?v=4"></script>
    <script src="k11-radar-profile.js?v=4"></script>
    <script src="k11-orcamento-ia.js?v=4"></script>
    <!-- ══ CAMADA 6: Obras ═══════════════════════════ -->
    <script src="k11-obra.js?v=4"></script>
    <!-- ══ CAMADA 7: Live Engine + Panel ═══════════ -->
    <script src="k11-live-engine.js?v=4"></script>
    <script src="k11-live-panel.js?v=4"></script>
    <!-- ══ CAMADA 8: Voz ════════════════════════════ -->
    <script src="k11-voice-id.js?v=4"></script>
    <script src="k11-key-voice.js?v=4"></script>
    <script src="k11-voice.js?v=4"></script>
    <!-- ══ CAMADA 9: Float AI + UX ══════════════════ -->
    <script src="k11-float-ai.js?v=4"></script>
    <script src="k11-gestures.js?v=4"></script>
    <script src="k11-onboarding-tour.js?v=4"></script>
    <!-- ══ CAMADA 10: Bootstrap ══════════════════════ -->
    <script src="k11-app.js?v=4"></script>

    <script>
    (function() {
        requestAnimationFrame(() => { const b=document.getElementById('splash-bar'); if(b) b.style.width='100%'; });
        if (!K11Auth.isAuthenticated()) { window.location.replace('/'); return; }
        window.addEventListener('DOMContentLoaded', async () => {
            try { if (typeof APP !== 'undefined' && typeof APP.init === 'function') await APP.init(); }
            catch(e) { console.error('[K11] Erro ao inicializar APP:', e); }
            setTimeout(() => {
                const s = document.getElementById('k11-splash');
                if (s) { s.style.transition='opacity .4s'; s.style.opacity='0'; setTimeout(()=>s.remove(),400); }
            }, 800);
        });
    })();

    window.K11Toast = function(message, type='info', duration=3500) {
        const colors={info:'#60A5FA',success:'#34D399',warning:'#FBBF24',error:'#F87171'};
        const t=document.createElement('div');
        t.style.cssText=`background:#1A1D2E;border:1px solid ${colors[type]||colors.info};color:#EDF0F7;padding:12px 16px;border-radius:8px;font-size:13px;max-width:320px;pointer-events:auto;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.5);border-left:3px solid ${colors[type]||colors.info};`;
        t.textContent=message; t.onclick=()=>t.remove();
        document.getElementById('k11-toast')?.appendChild(t);
        setTimeout(()=>{try{t.remove();}catch(_){}},duration);
    };
    </script>
</body>
</html>
