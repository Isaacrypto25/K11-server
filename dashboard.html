<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K11 OMNI ELITE 4.0</title>

    <!-- ══ PWA — MANIFEST ══════════════════════════════════════ -->
    <link rel="manifest" href="manifest.json">

    <!-- ══ PWA — iOS (Safari não lê manifest completamente) ════ -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="K11 OMNI">
    <link rel="apple-touch-icon" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="72x72"  href="icons/icon-72.png">
    <link rel="apple-touch-icon" sizes="96x96"  href="icons/icon-96.png">
    <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

    <!-- ══ PWA — SPLASH SCREENS iOS ════════════════════════════ -->
    <!-- iPhone 14 Pro Max -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
          href="icons/icon-512.png">
    <!-- iPhone 14 Pro -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)"
          href="icons/icon-512.png">
    <!-- iPhone 14 / 13 / 12 -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
          href="icons/icon-512.png">
    <!-- iPhone SE -->
    <link rel="apple-touch-startup-image"
          media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
          href="icons/icon-384.png">

    <!-- ══ PWA — TEMA E SEO ══════════════════════════════════════ -->
    <meta name="theme-color" content="#FF8C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="K11 OMNI">
    <meta name="description" content="Sistema operacional de estoque e PDV K11 OMNI ELITE">
    <meta name="format-detection" content="telephone=no">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
    <link rel="shortcut icon" href="icons/icon-96.png">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="global.css">
    <style>
        /* ── LITE MODE — esconde funcionalidades estratégicas ─── */
        body.mode-lite .nav-btn[data-view="dash"],
        body.mode-lite .nav-btn[data-view="projetor"] {
            display: none;
        }
        /* Badge de modo no top-bar */
        .mode-badge {
            font-size: 9px; font-weight: 900; letter-spacing: 1.5px;
            padding: 2px 8px; border-radius: 20px;
            margin-left: 8px; vertical-align: middle;
        }
        .mode-badge.lite  { background: rgba(59,130,246,.2);  color: #3b82f6; border: 1px solid rgba(59,130,246,.4); }
        .mode-badge.ultra { background: rgba(255,140,0,.15);  color: #ff8c00; border: 1px solid rgba(255,140,0,.3);  }
    </style>
</head>
<body>

    <!-- Toast container (gerado via JS) -->
    <!-- Modal overlay -->
    <div id="modal-overlay" class="modal-overlay"></div>

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="logo-container">
            <svg class="omni-logo-svg dashboard-version" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%"   style="stop-color:var(--primary);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#E67E00;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M35 10 L60 25 L60 55 L35 70 L10 55 L10 25 Z" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
                <text x="35" y="44" font-family="monospace" font-size="10" font-weight="900" fill="var(--secondary)" text-anchor="middle">0MNK1</text>
                <text x="75" y="40" font-family="'Inter', sans-serif" font-size="26" font-weight="900" fill="var(--secondary)">OMNI <tspan fill="var(--primary)">K11</tspan></text>
                <text x="77" y="58" font-family="'Inter', sans-serif" font-size="8" font-weight="800" fill="var(--text-muted)" letter-spacing="2.5">ELITE OPERATIONAL OS</text>
            </svg>
        </div>
        <div id="engine-status" class="mono label">BOOTING...</div>
        <span id="mode-badge-header"></span>
    </header>

    <!-- Stage -->
    <main id="stage">
        <div class="centered" style="margin-top: 100px;">
            <div class="spinner"></div>
            <p class="micro-label margin-t-10">Iniciando Kernel...</p>
        </div>
    </main>

    <nav class="main-nav">
        <button class="nav-btn active" data-view="dash" onclick="APP.view('dash', this)">
            <span class="material-symbols-outlined">dashboard</span>
            <span>DASH</span>
        </button>
        <button class="nav-btn" data-view="estoque" onclick="APP.view('estoque', this)" data-badge="rupturas">
            <span class="material-symbols-outlined">inventory_2</span>
            <span>ESTOQUE</span>
        </button>
        <button class="nav-btn" data-view="operacional" onclick="APP.view('operacional', this)">
            <span class="material-symbols-outlined">barcode_scanner</span>
            <span>COLETA</span>
        </button>
        <button class="nav-btn" id="k11-voice-btn" onclick="K11Voice.open()">
            <div class="voice-btn-ring">
                <div class="voice-btn-pulse"></div>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
                    <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" stroke="currentColor" stroke-width="1.8"/>
                    <path d="M19 10v2a7 7 0 01-14 0v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                    <line x1="8"  y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
            </div>
            <span>VOICE</span>
        </button>
        <button class="nav-btn" data-view="projetor" onclick="APP.view('projetor', this)">
            <span class="material-symbols-outlined">query_stats</span>
            <span>DUELO</span>
        </button>
        <button class="nav-btn" data-view="rastreio" onclick="APP.view('rastreio', this)">
            <span class="material-symbols-outlined">search</span>
            <span>RASTREIO</span>
        </button>
        <button class="nav-btn" data-view="recebimento" onclick="APP.view('recebimento', this)">
            <span class="material-symbols-outlined">local_shipping</span>
            <span>RECEB.</span>
        </button>
    </nav>
    <!-- 1. Configurações base (sem dependências) -->
    <script>
        // ── MODO DE OPERAÇÃO ─────────────────────────────────────
        (function() {
            const mode = (sessionStorage.getItem('k11_mode') || 'ultra').toLowerCase();
            window.K11_MODE = mode;

            // Aplica classe no body imediatamente (antes do layout)
            if (mode === 'lite') document.body.classList.add('mode-lite');

            // Em LITE, a primeira view padrão é estoque (não dash)
            window._K11_DEFAULT_VIEW = (mode === 'lite') ? 'estoque' : 'dash';
        })();
    </script>
    <script src="k11-config.js"></script>
    <script src="k11-setup.js"></script>

    <!-- 2. Core da aplicação -->
    <script src="k11-utils.js"></script>
    <script src="k11-ui.js"></script>
    <script src="k11-processors.js"></script>
    <script src="k11-views.js"></script>
    <script src="k11-actions.js"></script>
    <script src="k11-app.js"></script>
    <script src="k11-modal-regional.js"></script>

    <!-- 3. Dados (depende do core) -->
    <script src="k11-data-inject.js"></script>

    <!-- 4. Voice stack (ordem obrigatória) -->
    <script src="k11-key-voice.js"></script>
    <script src="k11-voice-id.js"></script>
    <script src="k11-brain-auxiliar.js"></script>
    <script src="k11-voice-assistant.js"></script>
    <script src="k11-float-ai.js"></script>

    <!-- ══ PWA — SERVICE WORKER ══════════════════════════════════ -->
    <script>
    (function() {
        'use strict';

        // ── Registro do Service Worker ────────────────────────────
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js', { scope: '/' })
                    .then(reg => {
                        console.log('[PWA] Service Worker registrado:', reg.scope);
                        reg.addEventListener('updatefound', () => {
                            const newSW = reg.installing;
                            newSW.addEventListener('statechange', () => {
                                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                                    if (typeof APP?.ui?.toast === 'function') {
                                        APP.ui.toast('Atualização disponível. Recarregue o app.', 'info');
                                    }
                                }
                            });
                        });
                    })
                    .catch(err => console.warn('[PWA] SW não registrado:', err.message));
            });
        }

        // ── Deep link via URL param (?view=estoque) ───────────────
        window.addEventListener('k11:ready', () => {
            const params = new URLSearchParams(window.location.search);
            const view   = params.get('view');
            if (view && typeof APP?.view === 'function') {
                APP.view(view);
            }
        });

        // ── Detecta modo PWA instalado ────────────────────────────
        const isPWA = window.matchMedia('(display-mode: standalone)').matches
                   || window.navigator.standalone === true;
        if (isPWA) {
            document.body.classList.add('pwa-mode');
            console.log('[PWA] Rodando como app instalado');
        }

        // ── Banner de instalação para iOS (Safari) ────────────────
        const isIOS    = /iphone|ipad|ipod/i.test(navigator.userAgent);
        const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

        if (isIOS && isSafari && !isPWA && !sessionStorage.getItem('k11_pwa_hint')) {
            sessionStorage.setItem('k11_pwa_hint', '1');
            setTimeout(() => {
                const hint = document.createElement('div');
                hint.id = 'k11-pwa-hint';
                hint.innerHTML = `
                    <div style="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
                        background:#1a1d2e;border:1px solid rgba(255,140,0,0.4);border-radius:16px;
                        padding:14px 18px;z-index:9990;max-width:320px;width:calc(100% - 32px);
                        box-shadow:0 8px 32px rgba(0,0,0,0.6);">
                        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                            <img src="icons/icon-72.png" style="width:36px;height:36px;border-radius:8px">
                            <div>
                                <div style="font-size:12px;font-weight:800;color:#FF8C00">INSTALAR K11 OMNI</div>
                                <div style="font-size:10px;color:#64748b">Adicione à tela inicial</div>
                            </div>
                            <button onclick="document.getElementById('k11-pwa-hint').remove()"
                                style="margin-left:auto;background:none;border:none;color:#64748b;font-size:20px;cursor:pointer">×</button>
                        </div>
                        <div style="font-size:11px;color:#94a3b8;line-height:1.7">
                            Toque em <b style="color:#e2e8f0">⬆ Compartilhar</b> e depois em<br>
                            <b style="color:#e2e8f0">📌 Adicionar à Tela de Início</b>
                        </div>
                    </div>`;
                document.body.appendChild(hint);
                setTimeout(() => hint?.remove(), 10000);
            }, 3000);
        }

    })();
    </script>

</body>
</html>
